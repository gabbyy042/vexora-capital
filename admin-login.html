<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - VEXORA CAPITAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', Arial, sans-serif; background: linear-gradient(135deg, #0B1437 0%, #1a1a2e 100%); 
               min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .form-container { background: #1a1a2e; padding: 40px; border-radius: 12px; border: 2px solid #EF4444; 
                          max-width: 450px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h1 { color: #EF4444; text-align: center; margin-bottom: 10px; font-size: 2rem; }
        .subtitle { text-align: center; color: #e0e0e0; margin-bottom: 30px; font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #e0e0e0; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 2px solid #EF4444; border-radius: 6px; background: #0f0f23; 
                color: #e0e0e0; font-size: 1rem; }
        input:focus { outline: none; border-color: #FF6B6B; }
        .btn { width: 100%; padding: 15px; background: #EF4444; color: white; border: none; border-radius: 6px; 
               font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .btn:hover { background: #DC2626; }
        .message { padding: 12px; border-radius: 6px; margin-bottom: 20px; text-align: center; }
        .error { background: #EF4444; color: white; }
        .success { background: #10B981; color: white; }
        .warning { background: #F59E0B; color: #0B1437; padding: 10px; border-radius: 6px; margin-top: 20px; 
                   font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>🔐 Admin Access</h1>
        <p class="subtitle">Authorized Personnel Only</p>
        <div id="message"></div>
        <form id="adminLoginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        <div class="warning">
            ⚠️ Default: Gabbyy042 / Chukwu1$<br>Change password immediately after first login!
        </div>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const messageEl = document.getElementById('message');

            try {
                const response = await fetch('backend/admin-auth.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    messageEl.innerHTML = '<div class="message success">' + data.message + '</div>';
                    setTimeout(() => window.location.href = data.data.redirect, 1000);
                } else {
                    messageEl.innerHTML = '<div class="message error">' + data.message + '</div>';
                }
            } catch (error) {
                messageEl.innerHTML = '<div class="message error">Login failed. Please try again.</div>';
            }
        });
    </script>
</body>
</html>
