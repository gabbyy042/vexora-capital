<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - VEXORA CAPITAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', Arial, sans-serif; background: #0f0f23; color: #e0e0e0; }
        .navbar { background: #0B1437; padding: 15px 30px; display: flex; justify-content: space-between; 
                  align-items: center; border-bottom: 2px solid #EF4444; }
        .logo { color: #EF4444; font-size: 1.5rem; font-weight: 900; }
        .logout { background: #EF4444; color: white; padding: 8px 20px; border-radius: 6px; text-decoration: none; }

        .container { max-width: 1600px; margin: 30px auto; padding: 0 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab { padding: 12px 24px; background: #1a1a2e; border: 2px solid #EF4444; border-radius: 6px; 
               cursor: pointer; font-weight: 600; }
        .tab.active { background: #EF4444; color: white; }

        .section { background: #1a1a2e; padding: 30px; border-radius: 12px; border: 2px solid #EF4444; 
                   margin-bottom: 20px; display: none; }
        .section.active { display: block; }
        h2 { color: #EF4444; margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #0B1437; color: #EF4444; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #333; }
        .status { padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
        .status.pending { background: #F59E0B; color: #0B1437; }
        .status.completed { background: #10B981; color: white; }
        .status.rejected { background: #EF4444; color: white; }

        .btn { padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer; font-weight: 600; 
               font-size: 0.85rem; }
        .btn-success { background: #10B981; color: white; }
        .btn-danger { background: #EF4444; color: white; }
        .btn-primary { background: #3B82F6; color: white; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                 background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal.show { display: flex; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a2e; padding: 30px; border-radius: 12px; border: 2px solid #EF4444; 
                         max-width: 500px; width: 90%; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #0f0f23; 
                          border: 2px solid #EF4444; border-radius: 6px; color: #e0e0e0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🔐 ADMIN PANEL</div>
        <a href="backend/admin-logout.php" class="logout">Logout</a>
    </nav>

    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="showTab('users')">Users</div>
            <div class="tab" onclick="showTab('deposits')">Deposits</div>
            <div class="tab" onclick="showTab('withdrawals')">Withdrawals</div>
        </div>

        <!-- Users Section -->
        <div id="users" class="section active">
            <h2>All Users</h2>
            <div id="usersTable">Loading...</div>
        </div>

        <!-- Deposits Section -->
        <div id="deposits" class="section">
            <h2>Deposit Requests</h2>
            <div id="depositsTable">Loading...</div>
        </div>

        <!-- Withdrawals Section -->
        <div id="withdrawals" class="section">
            <h2>Withdrawal Requests</h2>
            <div id="withdrawalsTable">Loading...</div>
        </div>
    </div>

    <!-- Balance Edit Modal -->
    <div id="balanceModal" class="modal">
        <div class="modal-content">
            <h2 style="color: #FFD700;">Edit Balance</h2>
            <form id="balanceForm">
                <input type="hidden" id="editUserId">
                <label>Amount (+ to add, - to subtract):</label>
                <input type="number" id="editAmount" step="0.01" required>
                <label>Reason:</label>
                <textarea id="editReason" required></textarea>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-success">Update</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');
            if (tab === 'deposits') loadDeposits();
            if (tab === 'withdrawals') loadWithdrawals();
        }

        async function loadUsers() {
            try {
                const response = await fetch('backend/admin-get-users.php');
                const result = await response.json();
                if (result.success) {
                    let html = '<table><tr><th>ID</th><th>Name</th><th>Email</th><th>Balance</th><th>Deposited</th><th>Status</th><th>Actions</th></tr>';
                    result.data.users.forEach(u => {
                        html += `<tr>
                            <td>${u.user_id}</td>
                            <td>${u.full_name}</td>
                            <td>${u.email}</td>
                            <td>$${parseFloat(u.balance).toFixed(2)}</td>
                            <td>$${parseFloat(u.total_deposited).toFixed(2)}</td>
                            <td><span class="status ${u.status}">${u.status}</span></td>
                            <td><button class="btn btn-primary" onclick="editBalance(${u.user_id})">Edit Balance</button></td>
                        </tr>`;
                    });
                    html += '</table>';
                    document.getElementById('usersTable').innerHTML = html;
                }
            } catch (error) {
                document.getElementById('usersTable').innerHTML = '<p style="color: #EF4444;">Failed to load users</p>';
            }
        }

        async function loadDeposits() {
            try {
                const response = await fetch('backend/admin-get-deposits.php');
                const result = await response.json();
                if (result.success) {
                    let html = '<table><tr><th>ID</th><th>User</th><th>Crypto</th><th>Amount</th><th>TX Hash</th><th>Status</th><th>Actions</th></tr>';
                    result.data.deposits.forEach(d => {
                        html += `<tr>
                            <td>${d.deposit_id}</td>
                            <td>${d.full_name}</td>
                            <td>${d.crypto_type}</td>
                            <td>$${parseFloat(d.amount).toFixed(2)}</td>
                            <td style="font-family: monospace; font-size: 0.8rem;">${d.tx_hash ? d.tx_hash.substring(0,20)+'...' : 'N/A'}</td>
                            <td><span class="status ${d.status}">${d.status}</span></td>
                            <td>${d.status === 'pending' ? 
                                `<button class="btn btn-success" onclick="approveDeposit(${d.deposit_id})">Approve</button>
                                 <button class="btn btn-danger" onclick="rejectDeposit(${d.deposit_id})">Reject</button>` : 
                                '-'}</td>
                        </tr>`;
                    });
                    html += '</table>';
                    document.getElementById('depositsTable').innerHTML = html;
                }
            } catch (error) {
                document.getElementById('depositsTable').innerHTML = '<p style="color: #EF4444;">Failed to load deposits</p>';
            }
        }

        async function loadWithdrawals() {
            try {
                const response = await fetch('backend/admin-get-withdrawals.php');
                const result = await response.json();
                if (result.success) {
                    let html = '<table><tr><th>ID</th><th>User</th><th>Crypto</th><th>Amount</th><th>Wallet</th><th>Status</th><th>Actions</th></tr>';
                    result.data.withdrawals.forEach(w => {
                        html += `<tr>
                            <td>${w.withdrawal_id}</td>
                            <td>${w.full_name}</td>
                            <td>${w.crypto_type}</td>
                            <td>$${parseFloat(w.amount).toFixed(2)}</td>
                            <td style="font-family: monospace; font-size: 0.8rem;">${w.wallet_address.substring(0,20)}...</td>
                            <td><span class="status ${w.status}">${w.status}</span></td>
                            <td>${w.status === 'pending' ? 
                                `<button class="btn btn-success" onclick="completeWithdrawal(${w.withdrawal_id})">Complete</button>
                                 <button class="btn btn-danger" onclick="rejectWithdrawal(${w.withdrawal_id})">Reject</button>` : 
                                '-'}</td>
                        </tr>`;
                    });
                    html += '</table>';
                    document.getElementById('withdrawalsTable').innerHTML = html;
                }
            } catch (error) {
                document.getElementById('withdrawalsTable').innerHTML = '<p style="color: #EF4444;">Failed to load withdrawals</p>';
            }
        }

        function editBalance(userId) {
            document.getElementById('editUserId').value = userId;
            document.getElementById('balanceModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('balanceModal').classList.remove('show');
            document.getElementById('balanceForm').reset();
        }

        document.getElementById('balanceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('user_id', document.getElementById('editUserId').value);
            formData.append('amount', document.getElementById('editAmount').value);
            formData.append('reason', document.getElementById('editReason').value);

            const response = await fetch('backend/admin-edit-balance.php', { method: 'POST', body: formData });
            const result = await response.json();
            alert(result.message);
            if (result.success) {
                closeModal();
                loadUsers();
            }
        });

        async function approveDeposit(id) {
            const notes = prompt('Add notes (optional):');
            const formData = new FormData();
            formData.append('deposit_id', id);
            formData.append('action', 'approve');
            formData.append('notes', notes || '');

            const response = await fetch('backend/admin-approve-deposit.php', { method: 'POST', body: formData });
            const result = await response.json();
            alert(result.message);
            if (result.success) loadDeposits();
        }

        async function rejectDeposit(id) {
            const reason = prompt('Rejection reason:');
            if (!reason) return;
            const formData = new FormData();
            formData.append('deposit_id', id);
            formData.append('action', 'reject');
            formData.append('notes', reason);

            const response = await fetch('backend/admin-approve-deposit.php', { method: 'POST', body: formData });
            const result = await response.json();
            alert(result.message);
            if (result.success) loadDeposits();
        }

        async function completeWithdrawal(id) {
            const txHash = prompt('Enter TX Hash after sending payment:');
            if (!txHash) return;
            const formData = new FormData();
            formData.append('withdrawal_id', id);
            formData.append('action', 'complete');
            formData.append('tx_hash', txHash);

            const response = await fetch('backend/admin-process-withdrawal.php', { method: 'POST', body: formData });
            const result = await response.json();
            alert(result.message);
            if (result.success) loadWithdrawals();
        }

        async function rejectWithdrawal(id) {
            const reason = prompt('Rejection reason:');
            if (!reason) return;
            const formData = new FormData();
            formData.append('withdrawal_id', id);
            formData.append('action', 'reject');
            formData.append('notes', reason);

            const response = await fetch('backend/admin-process-withdrawal.php', { method: 'POST', body: formData });
            const result = await response.json();
            alert(result.message);
            if (result.success) loadWithdrawals();
        }

        loadUsers();
    </script>
</body>
</html>
