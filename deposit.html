<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - VEXORA CAPITAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', Arial, sans-serif; background: #0f0f23; color: #e0e0e0; }
        .navbar { background: #0B1437; padding: 15px 30px; display: flex; justify-content: space-between; 
                  align-items: center; border-bottom: 2px solid #FFD700; }
        .logo { color: #FFD700; font-size: 1.5rem; font-weight: 900; }
        .nav-links a { color: #e0e0e0; text-decoration: none; margin-left: 20px; }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .card { background: #1a1a2e; padding: 40px; border-radius: 12px; border: 2px solid #FFD700; margin-bottom: 20px; }
        h1 { color: #FFD700; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        select, input { width: 100%; padding: 12px; border: 2px solid #FFD700; border-radius: 6px; 
                        background: #0f0f23; color: #e0e0e0; font-size: 1rem; }
        .wallet-info { background: #0B1437; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .wallet-address { background: #0f0f23; padding: 12px; border-radius: 6px; color: #FFD700; 
                          font-family: monospace; word-break: break-all; margin-top: 10px; }
        .qr-code { text-align: center; margin: 20px 0; }
        .qr-code img { max-width: 200px; border: 3px solid #FFD700; border-radius: 8px; }
        .btn { padding: 15px; background: #FFD700; color: #0B1437; border: none; border-radius: 6px; 
               font-size: 1.1rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 20px; }
        .message { padding: 12px; border-radius: 6px; margin-bottom: 20px; }
        .error { background: #EF4444; color: white; }
        .success { background: #10B981; color: white; }
        .warning { background: #F59E0B; color: #0B1437; padding: 15px; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">VEXORA CAPITAL</div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="deposit.html">Deposit</a>
            <a href="withdraw.html">Withdraw</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h1>Make Deposit</h1>
            <div id="message"></div>

            <form id="depositForm">
                <div class="form-group">
                    <label>Select Cryptocurrency</label>
                    <select name="crypto_type" id="cryptoType" required>
                        <option value="">-- Select Crypto --</option>
                        <option value="BTC">Bitcoin (BTC)</option>
                        <option value="ETH">Ethereum (ETH)</option>
                        <option value="USDT">USDT (TRC-20)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Amount (USD)</label>
                    <input type="number" name="amount" min="50" step="0.01" required 
                           placeholder="Minimum: $50">
                </div>

                <div id="walletInfo" style="display: none;">
                    <div class="wallet-info">
                        <h3 style="color: #FFD700; margin-bottom: 15px;">Send Payment To:</h3>
                        <div class="qr-code">
                            <img id="qrCode" src="" alt="QR Code">
                        </div>
                        <p style="margin-bottom: 10px;">Wallet Address:</p>
                        <div class="wallet-address" id="walletAddress"></div>
                        <div class="warning" style="margin-top: 20px;">
                            ⚠️ <strong>Important:</strong><br>
                            - Send ONLY <span id="selectedCrypto"></span> to this address<br>
                            - Copy transaction hash after payment<br>
                            - Deposit will be credited after admin approval
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Transaction Hash (TX Hash)</label>
                        <input type="text" name="tx_hash" required 
                               placeholder="Paste your transaction hash here">
                    </div>
                </div>

                <button type="submit" class="btn">Submit Deposit</button>
            </form>
        </div>
    </div>

    <script>
        const wallets = {
            BTC: 'bc1qz69wrtc6nkrqhxmta0h7jzv6wcut8pshaus3hw',
            ETH: '0xC8E8029Fe2Ea976394563F7a650f417b4dA5bAfE',
            USDT: 'TGLf3LMQ5FCjk5HuJx7gmmPLVWWkAxgXLD'
        };

        document.getElementById('cryptoType').addEventListener('change', function() {
            const crypto = this.value;
            if (crypto) {
                document.getElementById('walletInfo').style.display = 'block';
                document.getElementById('walletAddress').textContent = wallets[crypto];
                document.getElementById('qrCode').src = 
                    `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${wallets[crypto]}`;
                document.getElementById('selectedCrypto').textContent = crypto;
            } else {
                document.getElementById('walletInfo').style.display = 'none';
            }
        });

        document.getElementById('depositForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const messageEl = document.getElementById('message');

            try {
                const response = await fetch('backend/deposit-process.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    messageEl.innerHTML = '<div class="message success">' + data.message + '</div>';
                    e.target.reset();
                    document.getElementById('walletInfo').style.display = 'none';
                    setTimeout(() => window.location.href = 'dashboard.html', 3000);
                } else {
                    messageEl.innerHTML = '<div class="message error">' + data.message + '</div>';
                }
            } catch (error) {
                messageEl.innerHTML = '<div class="message error">Submission failed. Please try again.</div>';
            }
        });
    </script>
</body>
</html>
