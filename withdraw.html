<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - VEXORA CAPITAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', Arial, sans-serif; background: #0f0f23; color: #e0e0e0; }
        .navbar { background: #0B1437; padding: 15px 30px; display: flex; justify-content: space-between; 
                  align-items: center; border-bottom: 2px solid #FFD700; }
        .logo { color: #FFD700; font-size: 1.5rem; font-weight: 900; }
        .nav-links a { color: #e0e0e0; text-decoration: none; margin-left: 20px; }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .card { background: #1a1a2e; padding: 40px; border-radius: 12px; border: 2px solid #10B981; margin-bottom: 20px; }
        h1 { color: #10B981; margin-bottom: 20px; }
        .balance-info { background: #0B1437; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 30px; }
        .balance-label { color: #e0e0e0; font-size: 0.9rem; }
        .balance-amount { color: #FFD700; font-size: 2.5rem; font-weight: 900; margin-top: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        select, input { width: 100%; padding: 12px; border: 2px solid #10B981; border-radius: 6px; 
                        background: #0f0f23; color: #e0e0e0; font-size: 1rem; }
        .fee-info { background: #F59E0B; color: #0B1437; padding: 15px; border-radius: 8px; margin: 20px 0; 
                    font-weight: 600; }
        .btn { padding: 15px; background: #10B981; color: white; border: none; border-radius: 6px; 
               font-size: 1.1rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 20px; }
        .message { padding: 12px; border-radius: 6px; margin-bottom: 20px; }
        .error { background: #EF4444; color: white; }
        .success { background: #10B981; color: white; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">VEXORA CAPITAL</div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="deposit.html">Deposit</a>
            <a href="withdraw.html">Withdraw</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h1>Request Withdrawal</h1>

            <div class="balance-info">
                <div class="balance-label">Available Balance</div>
                <div class="balance-amount" id="balance">$0.00</div>
            </div>

            <div id="message"></div>

            <form id="withdrawForm">
                <div class="form-group">
                    <label>Select Cryptocurrency</label>
                    <select name="crypto_type" required>
                        <option value="">-- Select Crypto --</option>
                        <option value="BTC">Bitcoin (BTC)</option>
                        <option value="ETH">Ethereum (ETH)</option>
                        <option value="USDT">USDT (TRC-20)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Amount (USD)</label>
                    <input type="number" name="amount" id="withdrawAmount" min="50" step="0.01" required 
                           placeholder="Minimum: $50">
                </div>

                <div class="form-group">
                    <label>Your Wallet Address</label>
                    <input type="text" name="wallet_address" required 
                           placeholder="Enter your wallet address">
                </div>

                <div class="fee-info">
                    💰 Withdrawal Fee: 2%<br>
                    <span id="feeCalculation">Enter amount to see fee breakdown</span>
                </div>

                <button type="submit" class="btn">Request Withdrawal</button>
            </form>
        </div>
    </div>

    <script>
        // Load balance
        async function loadBalance() {
            try {
                const response = await fetch('backend/dashboard-backend.php');
                const result = await response.json();
                if (result.success) {
                    document.getElementById('balance').textContent = 
                        '$' + parseFloat(result.data.stats.balance).toFixed(2);
                }
            } catch (error) {
                console.error('Failed to load balance');
            }
        }

        // Calculate fee
        document.getElementById('withdrawAmount').addEventListener('input', function() {
            const amount = parseFloat(this.value) || 0;
            const fee = amount * 0.02;
            const net = amount - fee;
            if (amount > 0) {
                document.getElementById('feeCalculation').innerHTML = 
                    `Amount: $${amount.toFixed(2)} | Fee (2%): $${fee.toFixed(2)} | You receive: $${net.toFixed(2)}`;
            }
        });

        // Submit withdrawal
        document.getElementById('withdrawForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const messageEl = document.getElementById('message');

            try {
                const response = await fetch('backend/withdraw-process.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    messageEl.innerHTML = '<div class="message success">' + data.message + '</div>';
                    e.target.reset();
                    document.getElementById('feeCalculation').textContent = 'Enter amount to see fee breakdown';
                    setTimeout(() => window.location.href = 'dashboard.html', 3000);
                } else {
                    messageEl.innerHTML = '<div class="message error">' + data.message + '</div>';
                }
            } catch (error) {
                messageEl.innerHTML = '<div class="message error">Request failed. Please try again.</div>';
            }
        });

        loadBalance();
    </script>
</body>
</html>
